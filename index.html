<!DOCTYPE html>
<html lang="fr">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Browser-Classing</title>
   <link rel="stylesheet" href="styles/main.css">
   <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Press+Start+2P&display=swap"
      rel="stylesheet">
</head>

<body>
   <div class="app-container">
      <!-- Barre d'onglets -->
      <div class="tabs">
         <div class="tab active" data-url="https://www.google.com">Web</div>
         <div class="tab" data-url="file:///">Fichiers</div>
      </div>

      <!-- Zone de contenu -->
      <div class="content">
         <iframe id="web-view" src="https://www.google.com" frameborder="0"></iframe>
         <div id="file-explorer" class="hidden">
            <button id="open-folder">Ouvrir un dossier</button>
            <div id="files-list"></div>
         </div>
      </div>
   </div>
   <script src="scripts/main.js"></script>
</body>

</html>
